[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "conversor-his"
version = "0.1.0"
description = "Conversao auditavel de legislacao municipal para Markdown estruturado"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{name = "Projeto Protocolo HIS"}]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
]
dependencies = [
  "pymupdf>=1.24",
  "pydantic>=2.8",
  "PyYAML>=6.0",
  "typer>=0.12",
  "rich>=13.7",
  "python-docx>=1.1",
  "pillow>=10.4",
]

[project.optional-dependencies]
ocr = [
  "ocrmypdf>=16.4",
  "pytesseract>=0.3.13",
]
paddle = [
  "paddleocr>=3.0",
]
dev = [
  "pytest>=8.3",
  "pytest-cov>=5.0",
  "ruff>=0.6",
  "mypy>=1.11",
]

[project.scripts]
conversor-his = "conversor_his.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/conversor_his"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]