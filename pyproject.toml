[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "conversor-his"
version = "0.2.0"
description = "Conversao auditavel de legislacao municipal para Markdown estruturado"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{name = "Projeto Protocolo HIS"}]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming